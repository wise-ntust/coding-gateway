# coding-gateway loopback RX config — for local testing

[general]
mode = rx
tun_name = tun1
tun_addr = 10.0.0.2/30
listen_port = 7000

[coding]
k = 2
redundancy_ratio = 1.5
block_timeout_ms = 10
max_payload = 1400
window_size = 8

[strategy]
type = fixed
probe_interval_ms = 100
probe_loss_threshold = 0.3

[path.loopback]
interface = lo
remote_ip = 127.0.0.1
remote_port = 7001
weight = 1.0
enabled = true
