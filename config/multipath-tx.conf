[general]
mode = both
tun_name = tun0
tun_addr = 10.0.0.1/30
listen_port = 7001

[coding]
k = 1
redundancy_ratio = 2.0
block_timeout_ms = 10
max_payload = 1400
window_size = 8

[strategy]
type = fixed
probe_interval_ms = 100
probe_loss_threshold = 0.3
# ewma_alpha = 0.2    # EWMA smoothing for probe RTT/loss (0 < alpha ≤ 1)

[path.path1]
interface = eth0
remote_ip = 172.20.0.3
remote_port = 7000
weight = 1.0
enabled = true

[path.path2]
interface = eth1
remote_ip = 172.21.0.3
remote_port = 7000
weight = 1.0
enabled = true
