[general]
mode = both
tun_name = tun0
tun_addr = 10.0.0.1/30
listen_port = 7001

[coding]
k = 2
redundancy_ratio = 2.0
block_timeout_ms = 10

[strategy]
type = fixed

[forward]
ip_forward = true
route = 10.20.0.0/24
route = 192.168.99.0/24

[path.p1]
interface = eth0
remote_ip = 172.20.0.3
remote_port = 7000
enabled = true
