name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (zero warnings required)
        run: make

      - name: Unit tests
        run: make test

  docker-smoke:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: T01 Basic connectivity
        run: sh scripts/test_01_basic.sh
