name: Native

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "include/**"
      - "Makefile"
      - "config/**"
      - ".github/workflows/native.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "include/**"
      - "Makefile"
      - "config/**"
      - ".github/workflows/native.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build native target
        run: make native

      - name: Unit tests
        run: make test
