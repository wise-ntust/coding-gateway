# coding-gateway default configuration for OpenWrt
# Edit paths and addresses for your deployment.

[general]
mode = rx
tun_name = tun0
tun_addr = 10.0.0.2/30
listen_port = 7000
metrics_port = 9090

[coding]
k = 4
redundancy_ratio = 1.5
block_timeout_ms = 5
max_payload = 1400
window_size = 8

[strategy]
type = adaptive
probe_interval_ms = 100
probe_loss_threshold = 0.3

[path.mmwave_direct]
interface = eth1
remote_ip = 192.168.1.1
remote_port = 7000
weight = 1.0
enabled = true
